name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build Zig backend
        run: zig build -Doptimize=ReleaseFast

      - name: Create App Bundle
        run: |
          mkdir -p Nexus.app/Contents/{MacOS,Resources/static}
          cp zig-out/bin/cove Nexus.app/Contents/MacOS/nexus
          cp -r frontend/dist/* Nexus.app/Contents/Resources/static/

          # Create Info.plist
          cat > Nexus.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>nexus</string>
              <key>CFBundleIdentifier</key>
              <string>com.nexus.workspace</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Nexus</string>
              <key>CFBundleDisplayName</key>
              <string>Nexus</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.developer-tools</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
          </dict>
          </plist>
          EOF

      - name: Generate App Icon
        run: |
          mkdir -p /tmp/AppIcon.iconset
          sips -z 16 16 assets/icon.png --out /tmp/AppIcon.iconset/icon_16x16.png
          sips -z 32 32 assets/icon.png --out /tmp/AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon.png --out /tmp/AppIcon.iconset/icon_32x32.png
          sips -z 64 64 assets/icon.png --out /tmp/AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out /tmp/AppIcon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out /tmp/AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out /tmp/AppIcon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out /tmp/AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out /tmp/AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out /tmp/AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/AppIcon.iconset -o Nexus.app/Contents/Resources/AppIcon.icns

      - name: Ad-hoc Sign App
        run: codesign --force --deep --sign - Nexus.app

      - name: Create DMG
        run: |
          mkdir -p /tmp/dmg
          cp -r Nexus.app /tmp/dmg/
          ln -s /Applications /tmp/dmg/Applications
          hdiutil create -volname "Nexus" -srcfolder /tmp/dmg -ov -format UDZO Nexus.dmg

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-macOS
          path: Nexus.app
          retention-days: 30

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-DMG
          path: Nexus.dmg
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Nexus-DMG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Nexus.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
