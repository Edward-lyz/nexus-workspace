name: Build macOS App

env:
  MACOS_MIN_VERSION: '12.0'

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: x86_64
            name: Intel
          - os: macos-15
            arch: aarch64
            name: AppleSilicon

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        run: |
          # Use Zig 0.15.2 stable (matches minimum_zig_version in build.zig.zon)
          ZIG_URL=$(curl -s https://ziglang.org/download/index.json | python3 -c "import sys,json; print(json.load(sys.stdin)['0.15.2']['${{ matrix.arch }}-macos']['tarball'])")
          echo "Downloading: $ZIG_URL"
          curl -L "$ZIG_URL" | tar -xJ
          ZIG_DIR=$(ls -d zig-* | head -1)
          echo "$PWD/$ZIG_DIR" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build Zig backend
        run: zig build -Doptimize=ReleaseFast

      - name: Create App Bundle
        run: |
          mkdir -p Nexus.app/Contents/{MacOS,Resources/static}
          cp zig-out/bin/nexus Nexus.app/Contents/MacOS/nexus
          cp -r frontend/dist/* Nexus.app/Contents/Resources/static/

          CURRENT_SDK="$(xcrun --sdk macosx --show-sdk-version)"
          xcrun vtool -set-build-version macos "${{ env.MACOS_MIN_VERSION }}" "$CURRENT_SDK" \
            -replace \
            -output Nexus.app/Contents/MacOS/nexus.patched \
            Nexus.app/Contents/MacOS/nexus
          mv Nexus.app/Contents/MacOS/nexus.patched Nexus.app/Contents/MacOS/nexus

          cat > Nexus.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>nexus</string>
              <key>CFBundleIdentifier</key>
              <string>com.nexus.workspace</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Nexus</string>
              <key>CFBundleDisplayName</key>
              <string>Nexus</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>${{ env.MACOS_MIN_VERSION }}</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.developer-tools</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
          </dict>
          </plist>
          EOF

      - name: Verify binary minimum macOS version
        run: |
          ACTUAL_MINOS="$(otool -l Nexus.app/Contents/MacOS/nexus | awk '/LC_BUILD_VERSION/{flag=1; next} flag&&/minos/{print $2; exit}')"
          if [ "$ACTUAL_MINOS" != "${{ env.MACOS_MIN_VERSION }}" ]; then
            echo "Expected minos ${{ env.MACOS_MIN_VERSION }}, got $ACTUAL_MINOS"
            exit 1
          fi

      - name: Generate App Icon
        run: |
          mkdir -p /tmp/AppIcon.iconset
          sips -z 16 16 assets/icon.png --out /tmp/AppIcon.iconset/icon_16x16.png
          sips -z 32 32 assets/icon.png --out /tmp/AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon.png --out /tmp/AppIcon.iconset/icon_32x32.png
          sips -z 64 64 assets/icon.png --out /tmp/AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out /tmp/AppIcon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out /tmp/AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out /tmp/AppIcon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out /tmp/AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out /tmp/AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out /tmp/AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/AppIcon.iconset -o Nexus.app/Contents/Resources/AppIcon.icns

      - name: Ad-hoc Sign App
        run: codesign --force --deep --sign - Nexus.app

      - name: Create DMG
        run: |
          mkdir -p /tmp/dmg
          cp -r Nexus.app /tmp/dmg/
          ln -s /Applications /tmp/dmg/Applications
          hdiutil create -volname "Nexus" -srcfolder /tmp/dmg -ov -format UDZO Nexus-${{ matrix.arch }}.dmg

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-${{ matrix.arch }}
          path: Nexus.app
          retention-days: 30

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-DMG-${{ matrix.arch }}
          path: Nexus-${{ matrix.arch }}.dmg
          retention-days: 30

  nightly:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: Nexus-DMG-x86_64

      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: Nexus-DMG-aarch64

      - name: Generate nightly tag
        id: tag
        run: |
          TAG="nightly-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Rename DMGs with nightly tag
        run: |
          mv Nexus-x86_64.dmg Nexus-${{ steps.tag.outputs.tag }}-x86_64.dmg
          mv Nexus-aarch64.dmg Nexus-${{ steps.tag.outputs.tag }}-aarch64.dmg

      - name: Delete old nightly releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tag_pattern: nightly-
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Nightly ${{ steps.tag.outputs.tag }}
          body: |
            Automated nightly build from commit ${{ github.sha }}

            **Commit**: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Build**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            Nexus-${{ steps.tag.outputs.tag }}-x86_64.dmg
            Nexus-${{ steps.tag.outputs.tag }}-aarch64.dmg
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: Nexus-DMG-x86_64

      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: Nexus-DMG-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Nexus-x86_64.dmg
            Nexus-aarch64.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
