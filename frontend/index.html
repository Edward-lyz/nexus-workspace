<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus</title>
  <script>
    // Restore saved theme; default to light on first launch
    const saved = localStorage.getItem('nx-theme');
    document.documentElement.setAttribute('data-theme', saved ?? 'light');
  </script>
  <link rel="stylesheet" href="src/theme/tokens.css">
  <link rel="stylesheet" href="src/theme/base.css">
  <link rel="stylesheet" href="src/theme/liquid-glass.css">
</head>
<body>
  <!-- SVG Filters — Noir Studio: only glow filter retained -->
  <svg class="liquid-glass-defs" width="0" height="0" style="position:absolute;pointer-events:none;">
    <defs>
      <!-- Glow filter for accent highlights -->
      <filter id="liquid-glow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <div id="app"></div>
  <script type="module" src="src/main.tsx"></script>
</body>
</html>
